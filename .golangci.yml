version: "2"

linters:
  enable:
    - errcheck
    - govet
    - staticcheck
    - revive
    - misspell
    - gosec
    - ineffassign
    - unused
    - gocritic
    - copyloopvar
    - nilerr

  settings:
    revive:
      rules:
        - name: exported
          arguments:
            - disableStutteringCheck

  exclusions:
    rules:
      - path: _test\.go
        linters:
          - gosec
          - errcheck
      - path: examples/
        linters:
          - revive
          - errcheck
          - gosec
          - gocritic
      - path: internal/testutil/
        linters:
          - gosec
      - path: internal/process/process\.go
        linters:
          - gosec
      - text: "exported: exported (const|var) .+ should have comment"
        linters:
          - revive
      - text: "G703"
        linters:
          - gosec

formatters:
  enable:
    - gofmt
    - goimports
